name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'LICENSE'
      - '**.md'
  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - 'LICENSE'
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  METABRAINZ_DOCKER_VERSION: v-2025-06-23.0
  RABBITMQ_VERSION: 3.13.7
  RABBITMQ_VARIANT: -management
  SIR_VERSION: 4.0.1

permissions:
  packages: write

jobs:
  build_rabbitmq:
    name: Build rabbitmq
    if: ${{ ! github.event.repository.private }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout musicbrainz-docker
        uses: actions/checkout@v5
        with:
          repository: 'metabrainz/musicbrainz-docker'
          ref: ${{ env.METABRAINZ_DOCKER_VERSION }}
          path: musicbrainz-docker

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: |
            amd64
            arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rabbitmq
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          tags: |
            type=raw,value=${{ env.RABBITMQ_VERSION }}${{ env.RABBITMQ_VARIANT }}
          flavor: |
            latest=false

      - name: Validate build configuration
        uses: docker/build-push-action@v6
        with:
          context: musicbrainz-docker/build/rabbitmq
          call: check

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: musicbrainz-docker/build/rabbitmq
          platforms: |
            linux/amd64
            linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            RABBITMQ_VERSION=${{ env.RABBITMQ_VERSION }}
            RABBITMQ_VARIANT=${{ env.RABBITMQ_VARIANT }}

  build_sir:
    name: Build sir
    if: ${{ ! github.event.repository.private }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: |
            amd64
            arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sir
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          tags: |
            type=raw,value=${{ env.SIR_VERSION }},prefix=v
          flavor: |
            latest=false

      - name: Validate build configuration
        uses: docker/build-push-action@v6
        with:
          context: build/sir
          call: check

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: build/sir
          platforms: |
            linux/amd64
            linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            SIR_VERSION=${{ env.SIR_VERSION }}
